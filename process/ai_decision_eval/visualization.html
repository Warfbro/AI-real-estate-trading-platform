<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 决策评测对比报告</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      border-bottom: 3px solid #4CAF50;
      padding-bottom: 10px;
      margin-bottom: 30px;
    }
    h2 {
      color: #555;
      margin-top: 40px;
      margin-bottom: 20px;
    }
    .meta-info {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 30px;
      font-size: 14px;
      color: #666;
    }
    .meta-info strong {
      color: #333;
    }
    .chart-container {
      position: relative;
      height: 400px;
      margin-bottom: 50px;
    }
    .summary-table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }
    .summary-table th,
    .summary-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    .summary-table th {
      background: #4CAF50;
      color: white;
      font-weight: 600;
    }
    .summary-table tr:hover {
      background: #f5f5f5;
    }
    .best-score {
      background: #e8f5e9;
      font-weight: 600;
      color: #2e7d32;
    }
    .tag-overview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .tag-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 4px;
      border-left: 4px solid #4CAF50;
    }
    .tag-card h4 {
      margin: 0 0 8px 0;
      color: #333;
      font-size: 14px;
    }
    .tag-card p {
      margin: 0;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AI 决策评测对比报告</h1>

    <div class="meta-info">
      <strong>数据集版本：</strong><span id="dataset-version"></span> &nbsp;|&nbsp;
      <strong>生成时间：</strong><span id="generated-at"></span> &nbsp;|&nbsp;
      <strong>测试用例数：</strong><span id="total-cases"></span> &nbsp;|&nbsp;
      <strong>LLM 提供商：</strong><span id="provider-info"></span>
    </div>

    <h2>数据集标签分布</h2>
    <div class="tag-overview" id="tag-overview"></div>

    <h2>核心指标对比</h2>
    <table class="summary-table" id="summary-table">
      <thead>
        <tr>
          <th>Baseline</th>
          <th>Top-1 准确率</th>
          <th>Hit@3</th>
          <th>NDCG@3</th>
          <th>规则命中率</th>
          <th>Pairwise 胜率</th>
        </tr>
      </thead>
      <tbody id="summary-tbody"></tbody>
    </table>

    <div class="chart-container">
      <canvas id="mainMetricsChart"></canvas>
    </div>

    <h2>Top-1 准确率对比</h2>
    <div class="chart-container">
      <canvas id="top1Chart"></canvas>
    </div>

    <h2>NDCG@3 对比</h2>
    <div class="chart-container">
      <canvas id="ndcgChart"></canvas>
    </div>

    <h2>Pairwise 胜率对比</h2>
    <div class="chart-container">
      <canvas id="pairwiseChart"></canvas>
    </div>

    <h2>按标签分组 - Top-1 准确率</h2>
    <div class="chart-container" style="height: 600px;">
      <canvas id="tagTop1Chart"></canvas>
    </div>

    <h2>按标签分组 - NDCG@3</h2>
    <div class="chart-container" style="height: 600px;">
      <canvas id="tagNdcgChart"></canvas>
    </div>
  </div>

  <script>
    // 加载报告数据
    fetch('./ai_decision_eval_report.json')
      .then(response => response.json())
      .then(data => {
        renderReport(data);
      })
      .catch(error => {
        console.error('加载报告失败:', error);
        document.querySelector('.container').innerHTML = '<h1>加载报告失败</h1><p>请确保 ai_decision_eval_report.json 文件存在且格式正确。</p>';
      });

    function renderReport(data) {
      // 填充元数据
      document.getElementById('dataset-version').textContent = data.dataset_version;
      document.getElementById('generated-at').textContent = new Date(data.generated_at).toLocaleString('zh-CN');
      document.getElementById('total-cases').textContent = data.dataset_overview.total_cases;
      document.getElementById('provider-info').textContent = `${data.provider.model} (${data.provider.base_url.includes('dashscope') ? 'DashScope' : 'Custom'})`;

      // 渲染标签概览
      const tagOverview = document.getElementById('tag-overview');
      Object.entries(data.dataset_overview.tag_counts)
        .sort((a, b) => b[1] - a[1])
        .forEach(([tag, count]) => {
          const card = document.createElement('div');
          card.className = 'tag-card';
          card.innerHTML = `<h4>${tag}</h4><p>${count} 个用例</p>`;
          tagOverview.appendChild(card);
        });

      // 渲染汇总表格
      const tbody = document.getElementById('summary-tbody');
      const summaries = data.summaries;

      // 找出每列的最佳值
      const bestValues = {
        top1_accuracy: Math.max(...summaries.map(s => s.top1_accuracy)),
        hit_at_3: Math.max(...summaries.map(s => s.hit_at_3)),
        ndcg_at_3: Math.max(...summaries.map(s => s.ndcg_at_3)),
        top1_rule_hit_rate: Math.max(...summaries.map(s => s.top1_rule_hit_rate)),
        pairwise_win_rate: Math.max(...summaries.map(s => s.pairwise_win_rate || 0))
      };

      summaries.forEach(summary => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${summary.baseline}</strong></td>
          <td class="${summary.top1_accuracy === bestValues.top1_accuracy ? 'best-score' : ''}">${(summary.top1_accuracy * 100).toFixed(1)}%</td>
          <td class="${summary.hit_at_3 === bestValues.hit_at_3 ? 'best-score' : ''}">${(summary.hit_at_3 * 100).toFixed(1)}%</td>
          <td class="${summary.ndcg_at_3 === bestValues.ndcg_at_3 ? 'best-score' : ''}">${summary.ndcg_at_3.toFixed(4)}</td>
          <td class="${summary.top1_rule_hit_rate === bestValues.top1_rule_hit_rate ? 'best-score' : ''}">${(summary.top1_rule_hit_rate * 100).toFixed(1)}%</td>
          <td class="${summary.pairwise_win_rate === bestValues.pairwise_win_rate ? 'best-score' : ''}">${summary.pairwise_win_rate !== null ? (summary.pairwise_win_rate * 100).toFixed(1) + '%' : 'N/A'}</td>
        `;
        tbody.appendChild(row);
      });

      // 准备图表数据
      const labels = summaries.map(s => s.baseline);
      const colors = ['#4CAF50', '#FF9800', '#2196F3', '#9C27B0'];

      // 主要指标对比图
      new Chart(document.getElementById('mainMetricsChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Top-1 准确率',
              data: summaries.map(s => s.top1_accuracy),
              backgroundColor: colors[0],
            },
            {
              label: 'NDCG@3',
              data: summaries.map(s => s.ndcg_at_3),
              backgroundColor: colors[1],
            },
            {
              label: 'Pairwise 胜率',
              data: summaries.map(s => s.pairwise_win_rate || 0),
              backgroundColor: colors[2],
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
            },
            title: {
              display: true,
              text: '核心指标对比（归一化视图）'
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1,
              ticks: {
                callback: function(value) {
                  return (value * 100).toFixed(0) + '%';
                }
              }
            }
          }
        }
      });

      // Top-1 准确率对比
      new Chart(document.getElementById('top1Chart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Top-1 准确率',
            data: summaries.map(s => s.top1_accuracy),
            backgroundColor: colors,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1,
              ticks: {
                callback: function(value) {
                  return (value * 100).toFixed(0) + '%';
                }
              }
            }
          }
        }
      });

      // NDCG@3 对比
      new Chart(document.getElementById('ndcgChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'NDCG@3',
            data: summaries.map(s => s.ndcg_at_3),
            backgroundColor: colors,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1
            }
          }
        }
      });

      // Pairwise 胜率对比
      new Chart(document.getElementById('pairwiseChart'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Pairwise 胜率',
            data: summaries.map(s => s.pairwise_win_rate || 0),
            backgroundColor: colors,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1,
              ticks: {
                callback: function(value) {
                  return (value * 100).toFixed(0) + '%';
                }
              }
            }
          }
        }
      });

      // 按标签分组 - Top-1 准确率
      const allTags = Object.keys(data.dataset_overview.tag_counts).sort();
      const tagTop1Datasets = summaries.map((summary, idx) => {
        return {
          label: summary.baseline,
          data: allTags.map(tag => {
            const tagData = summary.by_tag[tag];
            return tagData ? tagData.top1_accuracy : null;
          }),
          backgroundColor: colors[idx],
        };
      });

      new Chart(document.getElementById('tagTop1Chart'), {
        type: 'bar',
        data: {
          labels: allTags,
          datasets: tagTop1Datasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
            },
            title: {
              display: true,
              text: '各标签场景 Top-1 准确率对比'
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1,
              ticks: {
                callback: function(value) {
                  return (value * 100).toFixed(0) + '%';
                }
              }
            }
          }
        }
      });

      // 按标签分组 - NDCG@3
      const tagNdcgDatasets = summaries.map((summary, idx) => {
        return {
          label: summary.baseline,
          data: allTags.map(tag => {
            const tagData = summary.by_tag[tag];
            return tagData ? tagData.ndcg_at_3 : null;
          }),
          backgroundColor: colors[idx],
        };
      });

      new Chart(document.getElementById('tagNdcgChart'), {
        type: 'bar',
        data: {
          labels: allTags,
          datasets: tagNdcgDatasets
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
            },
            title: {
              display: true,
              text: '各标签场景 NDCG@3 对比'
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 1
            }
          }
        }
      });
    }
  </script>
</body>
</html>
